name: Update news and deploy site

on:
  push:
    branches: [main]
  schedule:
    # GitHub Actions uses UTC. 15:20 UTC is 23:20 in China.
    - cron: "20 15 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        if: github.event_name != 'push'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install collector dependencies
        if: github.event_name != 'push'
        run: pip install -r requirements.txt

      - name: Fill missing days and refresh today
        if: github.event_name != 'push'
        run: |
          python update_current_affairs.py --backfill
          python update_current_affairs.py --force

      - name: Save refreshed public data
        if: github.event_name != 'push'
        run: |
          if git diff --quiet -- current-affairs-data.json current-affairs-data.js; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add current-affairs-data.json current-affairs-data.js
          git commit -m "Update daily current affairs"
          git push

      - name: Assemble static site
        run: |
          mkdir -p _site
          cp index.html learning-data.js current-affairs-data.js _site/
          touch _site/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
